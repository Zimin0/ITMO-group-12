{% extends 'base.html' %}

{% block title %}Письмо Деду Морозу - Santa CRM{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto; padding: 4rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 10px solid var(--santa-red);">
    <h1 style="color: var(--santa-red); font-size: 3rem; margin-top: 0; margin-bottom: 2rem; border-bottom: 3px double #eee; padding-bottom: 1rem; letter-spacing: -1px; font-weight: 800; text-transform: uppercase;">✉️ Написать письмо</h1>
    
    <form method="post" style="display: flex; flex-direction: column; gap: 2rem; text-align: left;">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.content.id_for_label }}" style="font-size: 1.3rem; margin-bottom: 1rem; color: #333; display: block; font-weight: 700;">📜 Текст письма:</label>
            {{ form.content }}
            {% if form.content.errors %}
                <p style="color: var(--santa-red); font-size: 0.9rem; margin-top: 0.5rem; font-weight: 600;">⚠️ {{ form.content.errors.0 }}</p>
            {% endif %}
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center;">
            <button type="submit" class="btn btn-primary" style="padding: 1.2rem 3rem; border-radius: 35px; font-size: 1.2rem; font-weight: 800; box-shadow: 0 4px 15px rgba(212, 36, 38, 0.3);">🚀 Отправить Деду Морозу!</button>
            <a href="{% url 'mainapp:letter_list' %}" class="btn btn-secondary" style="padding: 1.2rem 3rem; border-radius: 35px; font-size: 1.2rem; background: #eee; color: #333;">❌ Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
