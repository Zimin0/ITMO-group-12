{% extends 'base.html' %}

{% block title %}Вход - Santa CRM{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 3rem auto; padding: 3rem; text-align: center;">
    <h2 style="color: var(--santa-red); font-size: 2.2rem; margin-bottom: 0.5rem;">🚪 Вход в CRM</h2>
    <p style="margin-bottom: 2.5rem; color: #666; font-weight: 500;">Пожалуйста, представьтесь, дедушка или его верный помощник.</p>
    
    <form method="post" action="{% url 'login' %}" style="text-align: left;">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" class="form-input" required placeholder="Введите имя...">
        </div>
        
        <div class="form-group">
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" class="form-input" required placeholder="Введите пароль...">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 30px; margin-top: 1.5rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">Войти в систему</button>
    </form>
    
    <div style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
        <p style="color: #888; font-size: 0.9rem;">Нет доступа? Зарегистрируйтесь как <strong>Ребенок</strong> или обратитесь к главному эльфу.</p>
        <a href="{% url 'mainapp:register' %}" style="display: block; margin-top: 1rem; color: var(--santa-red); font-weight: 700; text-decoration: underline;">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
