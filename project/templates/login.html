{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 3rem auto; padding: 2.5rem;">
    <h1 style="margin-top: 0;">Вход</h1>
    <p style="color: #666;">После входа становятся доступны операции создания, редактирования и удаления.</p>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div style="color: #d42426; margin-bottom: 1rem;">{{ form.non_field_errors }}</div>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Логин</label>
            <input type="text" name="username" id="id_username" class="form-input" required value="{{ form.username.value|default:'' }}">
        </div>

        <div class="form-group">
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" class="form-input" required>
        </div>

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
    </form>
</div>
{% endblock %}
